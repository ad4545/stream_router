pekko {
  loggers = ["org.apache.pekko.event.slf4j.Slf4jLogger"]
  loglevel = "DEBUG"
  logging-filter = "org.apache.pekko.event.slf4j.Slf4jLoggingFilter"
  log-dead-letters = 20
  log-dead-letters-during-shutdown = on

  actor {
    provider = "cluster"
    allow-java-serialization = off
    warn-about-java-serializer-usage = false

    serialization-bindings {
      "com.example.CborSerializable" = jackson-cbor
    }
  }

  remote.artery {
    canonical {
      hostname = "10.0.0.10"
      port = 25520  # Overridden per-node at startup
    }

    advanced {
      maximum-frame-size = 256000b
      buffer-pool-size = 128
    }
  }

  cluster {
    seed-nodes = [
      "pekko://ClusterSystem@10.0.0.9:25520",
      "pekko://ClusterSystem@10.0.0.10:25520"
    ]

    downing-provider-class = "org.apache.pekko.cluster.sbr.SplitBrainResolverProvider"
    min-nr-of-members = 1

    split-brain-resolver {
      active-strategy = keep-majority
      stable-after = 20s
    }
  }

  coordinated-shutdown.terminate-actor-system = on
  coordinated-shutdown.run-by-actor-system-terminate = on

  http {
    server {
      preview {
        enable-http2 = on
      }
    }
  }
}

# gRPC Server configuration
grpc {
  port = 8080
}

# Per-topic router configuration
# Topics are discovered dynamically as messages arrive.
stream-router {
  topic-actor-buffer-size = 1024
  grpc-topic-lookup-timeout = 5s
  grpc-topic-retry-backoff-max = 4
}