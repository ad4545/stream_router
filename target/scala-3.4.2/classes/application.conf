akka {
  loggers = ["akka.event.slf4j.Slf4jLogger"]
  loglevel = "DEBUG"  # Changed to DEBUG for better troubleshooting
  logging-filter = "akka.event.slf4j.Slf4jLoggingFilter"
  log-dead-letters = 0
  log-dead-letters-during-shutdown = off
  
  actor {
    provider = "cluster"
    debug.receive = false  # Enable for debugging
    
    # Allow Java serialization for now (not recommended for production)
    allow-java-serialization = on
    warn-about-java-serializer-usage = off
    
    serializers {
      proto = "akka.remote.serialization.ProtobufSerializer"
    }
    
    serialization-bindings {
      # Protobuf messages
      "com.google.protobuf.Message" = proto
      
    }
    
    serialization-identifiers {
      "akka.remote.serialization.ProtobufSerializer" = 2
      "akka.serialization.jackson.JacksonJsonSerializer" = 31
    }
  }
  
  remote.artery {
    canonical {
      hostname = "127.0.0.1"
      port = 25520  # Default port - will be overridden in each node
    }
    
    # Add these for better reliability
    advanced {
      maximum-frame-size = 256000b
      buffer-pool-size = 128
    }
  }
  
  cluster {
    seed-nodes = [
      "akka://ClusterSystem@127.0.0.1:25520",
      "akka://ClusterSystem@127.0.0.1:25521"
    ]
    
    # Add these recommended settings
    downing-provider-class = "akka.cluster.sbr.SplitBrainResolverProvider"
    
    # Optional: Configure minimum cluster size
    min-nr-of-members = 1  # Changed to 1 for easier testing
    
    # Add these for better cluster behavior
    auto-down-unreachable-after = 10s
    
    split-brain-resolver {
      active-strategy = keep-majority
      stable-after = 20s
    }
    
    # Enable cluster events logging
    # log-info = on
    # log-info-verbose = on
  }
  
  # Add coordinated shutdown for graceful termination
  coordinated-shutdown.terminate-actor-system = on
  coordinated-shutdown.run-by-actor-system-terminate = on
}